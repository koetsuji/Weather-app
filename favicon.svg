<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">

    <defs>
        <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fff6b7"/>
            <stop offset="100%" stop-color="#ffd43b"/>
        </radialGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="128" height="128" rx="28" fill="#060816"/>

    <g stroke="#ffe066" stroke-width="6" stroke-linecap="round">
        <path d="M64 18V34"/>
        <path d="M64 94V110"/>
        <path d="M18 64H34"/>
        <path d="M94 64H110"/>
        <path d="M31 31L42 42"/>
        <path d="M86 86L97 97"/>
        <path d="M31 97L42 86"/>
        <path d="M86 42L97 31"/>
    </g>

    <circle
        cx="64"
        cy="64"
        r="24"
        fill="url(#sunGradient)"
        filter="url(#glow)"
    />

</svg>